{% extends "_layout.html" %}

{% block title %} Stats {% endblock %}

{% block content %}
    <form action="/stats" method="post" enctype="multipart/form-data">
    {% if error %}
    <p> {{ error }}</p>
    {% endif %}

<fieldset class="fieldset bg-base-100 border-base-300 rounded-box w-64 border p-4">
  <legend class="fieldset-legend">Анализ по частям речи</legend>
  <label class="label">
    <input type="checkbox" checked="checked" class="checkbox" />
    Вкл./выкл.
  </label>
</fieldset>
<input type="file" class="file-input file-input-primary" name="text" accept="text/plain" required>
<button class="btn btn-primary" type="submit">Анализ</button>
</p>
</form>
{% endblock %}
