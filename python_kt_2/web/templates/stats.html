{% extends "_layout.html" %}

{% block title %} Stats {% endblock %}

{% block content %}
  <form action="/stats" method="post" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:40px;">
    {% if error %}
      <p> {{ error }}</p>
    {% endif %}
  <legend class="fieldset-legend">Анализ по частям речи</legend>
    <label class="label">
      <input type="checkbox" checked="checked" class="checkbox" name="pos"/>
      Вкл./выкл.
    </label>
  <input type="file" class="file-input file-input-primary" name="text" accept="text/plain" required>
  <button class="btn btn-primary" type="submit">Анализ</button>
</form>
{% endblock %}
